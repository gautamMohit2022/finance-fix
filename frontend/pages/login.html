<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — FinTrack</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-wrap{width:100%;max-width:420px;position:relative;z-index:1}
.auth-brand{text-align:center;margin-bottom:36px}
.brand-logo{width:52px;height:52px;background:var(--accent-dim);border:1px solid var(--border-accent);border-radius:14px;display:grid;place-items:center;font-size:24px;margin:0 auto 14px}
.brand-name{font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--text-primary)}
.brand-sub{font-size:.82rem;color:var(--text-secondary);margin-top:3px}
.auth-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.auth-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:6px}
.auth-desc{font-size:.82rem;color:var(--text-secondary);margin-bottom:24px}
.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:22px}
.role-tab{padding:9px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all var(--tr);text-align:center;font-size:.75rem;font-weight:600;color:var(--text-secondary)}
.role-tab.active{background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent)}
.role-tab .role-icon{font-size:16px;display:block;margin-bottom:3px}
.forgot{font-size:.78rem;color:var(--accent);float:right;margin-top:-4px}
.auth-footer{text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-secondary)}
.demo-info{background:var(--accent-dim);border:1px solid var(--border-accent);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:18px;font-size:.78rem;color:var(--accent)}
</style>
</head>
<body>
<div class="auth-wrap fade-in">
  <div class="auth-brand">
    <div class="brand-logo">💰</div>
    <div class="brand-name">FinTrack</div>
    <div class="brand-sub">Finance Tracking System v2.0</div>
  </div>

  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-desc">Sign in to your account to continue</p>

    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('viewer')"><span class="role-icon">👁️</span>Viewer</div>
      <div class="role-tab" onclick="setRole('analyst')"><span class="role-icon">📊</span>Analyst</div>
      <div class="role-tab" onclick="setRole('admin')"><span class="role-icon">⚙️</span>Admin</div>
    </div>

    <div class="demo-info" id="demoInfo">👁️ <strong>Viewer</strong> — Read-only access to records and summaries</div>

    <div class="form-group">
      <label class="form-label">Email / Username</label>
      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input class="form-input" id="username" type="text" placeholder="Enter your email" autocomplete="username">
      </div>
      <div class="form-error" id="usernameErr">Please enter your email</div>
    </div>

    <div class="form-group">
      <label class="form-label">Password <a class="forgot" href="#">Forgot?</a></label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="input-suffix" onclick="togglePwd()" id="eyeIcon">👁️</span>
      </div>
      <div class="form-error" id="passwordErr">Please enter your password</div>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="divider-text">or</div>

    <div class="auth-footer">Don't have an account? <a href="register.html">Create one</a></div>
  </div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
if (auth.isLoggedIn()) window.location.href = 'dashboard.html';

const roleInfo = {
  viewer:  '👁️ <strong>Viewer</strong> — Read-only access to records and summaries',
  analyst: '📊 <strong>Analyst</strong> — View records, apply filters and detailed insights',
  admin:   '⚙️ <strong>Admin</strong> — Full access: create, update, delete records and users'
};

function setRole(role) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('demoInfo').innerHTML = roleInfo[role];
}

function togglePwd() {
  const p = document.getElementById('password');
  const e = document.getElementById('eyeIcon');
  if (p.type === 'password') { p.type = 'text'; e.textContent = '🙈'; }
  else { p.type = 'password'; e.textContent = '👁️'; }
}

async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  let ok = true;

  document.getElementById('usernameErr').classList.remove('show');
  document.getElementById('passwordErr').classList.remove('show');

  if (!u) { document.getElementById('usernameErr').classList.add('show'); ok = false; }
  if (!p) { document.getElementById('passwordErr').classList.add('show'); ok = false; }
  if (!ok) return;

  const btn = document.getElementById('loginBtn');
  utils.setLoading(btn, true);

  try {
    const data = await api.login(u, p);
    const me = await (async () => {
      localStorage.setItem('token', data.access_token);
      return api.getMe();
    })();
    auth.save(data.access_token, me);
    utils.toast('Login successful! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(e) {
    utils.toast(e.message || 'Invalid credentials', 'error');
    utils.setLoading(btn, false);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
