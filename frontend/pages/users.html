<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users — FinTrack</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
<div class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">💰 FinTrack</div>

  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html">Dashboard</a>
    <a class="nav-item" href="transaction.html">Transactions</a>
    <a class="nav-item" href="budget.html">Budget</a>
    <a class="nav-item" href="analytics.html">Analytics</a>
    <a class="nav-item" href="profile.html">Profile</a>
    <a class="nav-item active" href="users.html">Users</a>
    <a class="nav-item" onclick="auth.logout()">Logout</a>
  </nav>
</aside>

<!-- MAIN -->
<div class="main-content">
<div class="page-content">

<div class="page-header">
  <div>
    <div class="page-title">User Management</div>
    <div class="page-desc">Manage users and roles</div>
  </div>
</div>

<div class="filter-bar">
  <input class="form-input" type="text" id="search" placeholder="Search users..." oninput="filterUsers()">
  <button id="addUserBtn" class="btn btn-primary" style="display:none">➕ Add User</button>
</div>

<div id="users"></div>

</div>
</div>
</div>

<!-- ✅ MODAL USING GLOBAL CSS -->
<div id="modal" class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <div>
        <div class="modal-title">Create User</div>
        <div class="modal-subtitle">Add new user</div>
      </div>
      <div class="modal-close" onclick="closeModal()">✖</div>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <input class="form-input" id="name" placeholder="Full Name">
      </div>

      <div class="form-group">
        <input class="form-input" id="email" placeholder="Email">
      </div>

      <div class="form-group">
        <input class="form-input" id="password" type="password" placeholder="Password">
      </div>

      <div class="form-group">
        <select class="form-select" id="role">
          <option value="viewer">Viewer</option>
          <option value="analyst">Analyst</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createUser()">Create</button>
    </div>

  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>

<script>
auth.requireAuth();

const me = auth.getUser();

if (me.role === 'viewer') {
  alert("Access denied");
  window.location.href = "dashboard.html";
}

// show add button only for admin
if (me.role === 'admin') {
  document.getElementById("addUserBtn").style.display = "inline-block";
}

let allUsers = [];

async function loadUsers() {
  try {
    allUsers = await api.getAllUsers();
    renderUsers(allUsers);
  } catch (e) {
    alert(e.message);
  }
}

function renderUsers(users) {
  document.getElementById("users").innerHTML = users.map(u => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">

        <div>
          <b>${u.full_name}</b><br>
          <span class="text-muted">${u.email}</span><br>
          <span class="badge badge-blue">${u.role}</span>
        </div>

        <div>
          <select id="r${u.id}" class="form-select" ${me.role !== 'admin' ? 'disabled' : ''}>
            <option ${u.role=='viewer'?'selected':''}>viewer</option>
            <option ${u.role=='analyst'?'selected':''}>analyst</option>
            <option ${u.role=='admin'?'selected':''}>admin</option>
          </select>

          ${me.role === 'admin' ? `
            <button class="btn btn-primary btn-sm" onclick="updateRole(${u.id})">Update</button>
            ${u.id !== me.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Delete</button>` : ''}
          ` : ''}
        </div>

      </div>
    </div>
  `).join('');
}

function filterUsers() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = allUsers.filter(u =>
    u.full_name.toLowerCase().includes(q) ||
    u.email.toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

async function updateRole(id) {
  const role = document.getElementById("r"+id).value;
  await api.updateUser(id, { role });
  loadUsers();
}

async function deleteUser(id) {
  if (!confirm("Delete user?")) return;
  await api.deleteUser(id);
  loadUsers();
}

// OPEN MODAL
window.onload = () => {
  document.getElementById("addUserBtn").onclick = () => {
    console.log("clicked");
    document.getElementById("modal").classList.add("open");
  };
};

// CLOSE MODAL
function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// CREATE USER
async function createUser() {
  const data = {
    full_name: name.value,
    email: email.value,
    password: password.value,
    role: role.value
  };

  await api.register(data);
  closeModal();
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
