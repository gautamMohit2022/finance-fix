<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users — FinTrack</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
<div class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">💰 FinTrack</div>

  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html">Dashboard</a>
    <a class="nav-item" href="transaction.html">Transactions</a>
    <a class="nav-item" href="budget.html">Budget</a>
    <a class="nav-item nav-analytics" href="analytics.html">Analytics</a>

    <a class="nav-item" href="profile.html">Profile</a>
    <a class="nav-item nav-users active" href="users.html">Users</a>
    <a class="nav-item" onclick="auth.logout()">Logout</a>
  </nav>
</aside>

<!-- MAIN -->
<div class="main-content">

<h2>User Management</h2>

<div style="margin-bottom:20px">
  <input type="text" id="search" placeholder="Search users..." oninput="filterUsers()">
  
  <button id="addUserBtn" style="display:none">➕ Add User</button>
</div>

<div id="stats"></div>
<div id="users"></div>

</div>
</div>

<!-- ADD USER MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center">
  <div style="background:#111;padding:20px;border-radius:10px">
    <h3>Create User</h3>
    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <select id="role">
      <option value="viewer">Viewer</option>
      <option value="analyst">Analyst</option>
      <option value="admin">Admin</option>
    </select><br><br>

    <button onclick="createUser()">Create</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>

<script>
auth.requireAuth();

const me = auth.getUser();

if (me.role === 'viewer') {
  alert("Access denied");
  window.location.href = "dashboard.html";
}

// SHOW ADD BUTTON ONLY ADMIN
if (me.role === 'admin') {
  document.getElementById("addUserBtn").style.display = "inline-block";
}

let allUsers = [];

async function loadUsers() {
  try {
    allUsers = await api.getAllUsers();
    renderUsers(allUsers);
  } catch (e) {
    alert(e.message);
  }
}

function renderUsers(users) {
  document.getElementById("users").innerHTML = users.map(u => `
    <div style="border:1px solid #444;margin:10px;padding:10px">

      <b>${u.full_name}</b> (${u.email})<br>
      Role: ${u.role}

      <br><br>

      <select id="r${u.id}" ${me.role !== 'admin' ? 'disabled' : ''}>
        <option ${u.role=='viewer'?'selected':''}>viewer</option>
        <option ${u.role=='analyst'?'selected':''}>analyst</option>
        <option ${u.role=='admin'?'selected':''}>admin</option>
      </select>

      ${me.role === 'admin' ? `
        <button onclick="updateRole(${u.id})">Update</button>
        ${u.id !== me.id ? `<button onclick="deleteUser(${u.id})">Delete</button>` : ''}
      ` : ''}

    </div>
  `).join('');
}

function filterUsers() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = allUsers.filter(u =>
    u.full_name.toLowerCase().includes(q) ||
    u.email.toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

// UPDATE ROLE
async function updateRole(id) {
  const role = document.getElementById("r"+id).value;
  await api.updateUser(id, { role });
  loadUsers();
}

// DELETE
async function deleteUser(id) {
  if (!confirm("Delete user?")) return;
  await api.deleteUser(id);
  loadUsers();
}

// ADD USER
document.getElementById("addUserBtn").onclick = () => {
  document.getElementById("modal").style.display = "flex";
};

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

async function createUser() {
  const data = {
    full_name: name.value,
    email: email.value,
    password: password.value,
    role: role.value
  };

  await api.register(data);
  closeModal();
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
